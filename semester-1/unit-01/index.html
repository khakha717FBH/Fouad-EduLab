<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<title>الوحدة الأولى | Fouad EduLab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#131c30; --navy:#1B2640; --teal:#14C8A8;
    --teal-glow:rgba(20,200,168,.35); --coral:#ff6b4a;
    --text:#EAF1F0; --text-dim:#9FB0C3; --border:rgba(20,200,168,.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:linear-gradient(180deg,var(--navy-deep),var(--navy) 35%,var(--navy-deep));
    color:var(--text); font-family:'Tajawal','Cairo',sans-serif; line-height:1.8; min-height:100dvh;
  }
  .wrap{max-width:900px;margin:0 auto;padding:clamp(16px,4vw,40px);}
  .crumb{color:var(--text-dim);font-size:14px;margin-bottom:8px;}
  .crumb a{color:var(--teal);text-decoration:none;}
  h1{font-family:'Cairo',sans-serif;font-weight:800;font-size:clamp(24px,4vw,34px);margin:0 0 30px;}

  .lesson-list{display:grid;gap:12px;}
  .lesson-card{
    display:flex;align-items:center;gap:16px;
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px 20px;
    text-decoration:none;
    color:var(--text);
    background:rgba(255,255,255,.02);
    transition:.25s;
  }
  .lesson-card:hover{border-color:var(--teal);box-shadow:0 0 18px var(--teal-glow);}
  .lesson-card.disabled{opacity:.4;pointer-events:none;}
  .lesson-num{
    flex:0 0 auto;width:38px;height:38px;border-radius:50%;
    border:1px solid var(--teal);color:var(--teal);
    display:flex;align-items:center;justify-content:center;font-weight:700;
  }
  .lesson-title{font-family:'Cairo',sans-serif;font-weight:700;font-size:16px;}
  .lesson-status{margin-right:auto;font-size:12px;color:var(--text-dim);}
</style>
</head>
